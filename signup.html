<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CryptoSignal — Criar conta</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#06080f;--s1:#0c0f1a;--s2:#111824;
  --b1:rgba(255,255,255,0.05);--b2:rgba(255,255,255,0.09);--b3:rgba(255,255,255,0.16);
  --t1:#e4e9f8;--t2:#6b7fa3;--t3:#2e3a52;
  --green:#00d97e;--green2:rgba(0,217,126,0.1);--greenb:rgba(0,217,126,0.22);
  --red:#ff4d6d;--red2:rgba(255,77,109,0.1);--redb:rgba(255,77,109,0.22);
  --blue:#4f6ef7;--blue2:rgba(79,110,247,0.12);--blueb:rgba(79,110,247,0.25);
  --gold:#f0c040;--gold2:rgba(240,192,64,0.09);--goldb:rgba(240,192,64,0.22);
  --purple:#a78bfa;--purple2:rgba(167,139,250,0.1);--purpleb:rgba(167,139,250,0.22);
  --mono:'JetBrains Mono',monospace;--ui:'Outfit',sans-serif;
}
body{background:var(--bg);font-family:var(--ui);color:var(--t1);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;}
.card{background:var(--s1);border:1px solid var(--b2);border-radius:16px;padding:2rem;width:100%;max-width:420px;}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:1.5rem;text-decoration:none;}
.logo-ico{width:36px;height:36px;background:linear-gradient(135deg,#4f6ef7,#7c3aed);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;color:#fff;}
.logo-name{font-size:18px;font-weight:800;color:var(--t1);}
.logo-name span{color:#4f6ef7;}
.plan-badge{display:flex;align-items:center;gap:8px;border-radius:8px;padding:.625rem .875rem;margin-bottom:1.25rem;font-size:12px;}
.plan-badge.mensal{background:var(--blue2);border:1px solid var(--blueb);color:#4f6ef7;}
.title{font-size:20px;font-weight:700;margin-bottom:.375rem;}
.subtitle{font-size:13px;color:var(--t2);margin-bottom:1.25rem;line-height:1.5;}
.error{background:var(--red2);border:1px solid var(--redb);border-radius:7px;padding:.625rem .875rem;font-size:12px;color:var(--red);margin-bottom:.875rem;display:none;}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:.75rem;}
.field label{font-size:12px;color:var(--t2);}
.field input{background:var(--s2);border:1px solid var(--b2);border-radius:8px;padding:10px 12px;color:var(--t1);font-family:var(--ui);font-size:14px;outline:none;transition:border-color .2s;width:100%;}
.field input:focus{border-color:#4f6ef7;}
.btn{width:100%;padding:11px;border:none;border-radius:9px;font-family:var(--ui);font-size:14px;font-weight:700;cursor:pointer;margin-top:.25rem;transition:all .15s;}
.btn-mensal{background:#4f6ef7;color:#fff;}
.btn-mensal:hover{opacity:.88;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.note{font-size:11px;color:var(--t3);text-align:center;margin-top:.75rem;line-height:1.5;}
.toggle{text-align:center;font-size:13px;color:var(--t2);margin-top:1rem;}
.toggle a{color:#4f6ef7;text-decoration:none;}
.back{text-align:center;margin-top:.5rem;}
.back a{font-size:12px;color:var(--t2);text-decoration:none;}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
  <a href="index.html" class="logo">
    <div class="logo-ico">◈</div>
    <div class="logo-name">Crypto<span>Signal</span></div>
  </a>
  <div class="plan-badge mensal">
    <span>◎</span>
    <span>Plano Mensal — R$97/mês</span>
  </div>
  <div class="title">Criar sua conta</div>
  <div class="subtitle">Comece agora e tenha sinais profissionais em tempo real.</div>
  <div class="error" id="error-msg"></div>
  <div class="field">
    <label>Nome completo</label>
    <input type="text" id="name" placeholder="Seu nome completo" autocomplete="name">
  </div>
  <div class="field">
    <label>E-mail</label>
    <input type="email" id="email" placeholder="seu@email.com" autocomplete="email">
  </div>
  <div class="field">
    <label>Senha</label>
    <input type="password" id="password" placeholder="mínimo 8 caracteres" autocomplete="new-password">
  </div>
  <button class="btn btn-mensal" id="btn-signup" onclick="doSignup()">Criar conta e assinar →</button>
  <div class="note">Ao continuar você será redirecionado ao Stripe para pagamento seguro.<br>Garantia de 7 dias — sem perguntas.</div>
