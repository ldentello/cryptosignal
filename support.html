<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CryptoSignal — Cipher Suporte</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#06080f;--s1:#0c0f1a;--s2:#111824;--s3:#171e2e;
  --b1:rgba(255,255,255,0.05);--b2:rgba(255,255,255,0.09);--b3:rgba(255,255,255,0.16);
  --t1:#e4e9f8;--t2:#6b7fa3;--t3:#2e3a52;
  --green:#00d97e;--green2:rgba(0,217,126,0.1);--greenb:rgba(0,217,126,0.22);
  --cipher:#7c6ef7;--cipher2:rgba(124,110,247,0.12);--cipherb:rgba(124,110,247,0.25);
  --mono:'JetBrains Mono',monospace;--ui:'Outfit',sans-serif;
}
body{background:var(--bg);font-family:var(--ui);color:var(--t1);height:100vh;display:flex;flex-direction:column;}

.topbar{background:var(--s1);border-bottom:1px solid var(--b2);padding:.75rem 1.25rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.brand{display:flex;align-items:center;gap:8px;text-decoration:none;}
.brand-ico{width:28px;height:28px;background:linear-gradient(135deg,#4f6ef7,#7c3aed);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;}
.brand-name{font-size:13px;font-weight:800;color:var(--t1);}
.brand-name span{color:#4f6ef7;}
.back-btn{font-size:12px;color:var(--t2);text-decoration:none;padding:5px 11px;border:1px solid var(--b2);border-radius:7px;background:var(--s2);}

.cipher-header{background:var(--s1);border-bottom:1px solid var(--b2);padding:.875rem 1.25rem;display:flex;align-items:center;gap:.875rem;flex-shrink:0;}
.cipher-avatar{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,var(--cipher),#4f6ef7);display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;flex-shrink:0;position:relative;}
.cipher-status{position:absolute;bottom:-2px;right:-2px;width:12px;height:12px;border-radius:50%;background:var(--green);border:2px solid var(--s1);}
.cipher-name{font-size:14px;font-weight:700;}
.cipher-role{font-size:11px;color:var(--t2);margin-top:1px;display:flex;align-items:center;gap:5px;}
.online-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:p 2s infinite;}
@keyframes p{0%,100%{opacity:1}50%{opacity:.3}}
.cipher-meta{margin-left:auto;text-align:right;}
.cipher-meta-label{font-size:10px;color:var(--t2);}
.cipher-meta-val{font-size:11px;font-family:var(--mono);color:var(--green);margin-top:1px;}

.messages{flex:1;overflow-y:auto;padding:1.25rem;display:flex;flex-direction:column;gap:.875rem;scrollbar-width:thin;scrollbar-color:var(--s3) transparent;}
.messages::-webkit-scrollbar{width:4px;}
.messages::-webkit-scrollbar-thumb{background:var(--s3);border-radius:2px;}

.msg-wrap{display:flex;gap:.625rem;align-items:flex-end;}
.msg-wrap.user{flex-direction:row-reverse;}
.msg-avatar{width:28px;height:28px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;}
.cipher-msg-avatar{background:linear-gradient(135deg,var(--cipher),#4f6ef7);}
.user-msg-avatar{background:var(--s3);font-size:11px;font-weight:700;color:var(--t2);}
.bubble{max-width:78%;padding:.7rem .9rem;border-radius:12px;font-size:13px;line-height:1.65;}
.bubble.cipher{background:var(--s2);border:1px solid var(--b2);border-bottom-left-radius:4px;color:var(--t1);}
.bubble.user{background:#4f6ef7;border-bottom-right-radius:4px;color:#fff;}
.msg-time{font-size:10px;color:var(--t3);margin-top:3px;}
.msg-time.cipher-time{text-align:left;}
.sys-msg{text-align:center;font-size:11px;color:var(--t2);padding:.25rem 0;}

.typing-wrap{display:flex;gap:.625rem;align-items:flex-end;}
.typing-bubble{background:var(--s2);border:1px solid var(--b2);border-bottom-left-radius:4px;padding:.6rem .875rem;border-radius:12px;display:flex;gap:4px;align-items:center;}
.typing-dot{width:6px;height:6px;border-radius:50%;background:var(--t2);animation:td 1.2s infinite;}
.typing-dot:nth-child(2){animation-delay:.2s;}
.typing-dot:nth-child(3){animation-delay:.4s;}
@keyframes td{0%,80%,100%{transform:translateY(0);opacity:.4}40%{transform:translateY(-5px);opacity:1}}
.typing-name{font-size:10px;color:var(--t2);align-self:flex-end;padding-bottom:4px;}

.quick-replies{padding:.75rem 1.25rem;display:flex;gap:.5rem;flex-wrap:wrap;border-top:1px solid var(--b1);flex-shrink:0;}
.qr-label{font-size:10px;color:var(--t2);align-self:center;flex-shrink:0;}
.qr{font-size:11px;padding:5px 12px;border-radius:20px;border:1px solid var(--b2);background:var(--s2);color:var(--t2);cursor:pointer;transition:all .15s;white-space:nowrap;}
.qr:hover{border-color:var(--cipher);color:var(--t1);}

.input-area{padding:.875rem 1.25rem;border-top:1px solid var(--b2);background:var(--s1);display:flex;gap:.625rem;align-items:flex-end;flex-shrink:0;}
.input-wrap{flex:1;background:var(--s2);border:1px solid var(--b2);border-radius:10px;display:flex;align-items:center;gap:.5rem;padding:.5rem .875rem;transition:border-color .2s;}
.input-wrap:focus-within{border-color:var(--cipher);}
.msg-input{flex:1;background:none;border:none;color:var(--t1);font-family:var(--ui);font-size:13px;outline:none;resize:none;max-height:80px;line-height:1.5;}
.msg-input::placeholder{color:var(--t3);}
.send-btn{width:36px;height:36px;background:var(--cipher);border:none;border-radius:8px;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;transition:opacity .15s;}
.send-btn:hover{opacity:.85;}
.send-btn:disabled{opacity:.35;cursor:not-allowed;}
</style>
</head>
<body>

<div class="topbar">
  <a href="dashboard.html" class="brand">
    <div class="brand-ico">◈</div>
    <div class="brand-name">Crypto<span>Signal</span></div>
  </a>
  <a href="dashboard.html" class="back-btn">← Dashboard</a>
</div>

<div class="cipher-header">
  <div class="cipher-avatar">◈<div class="cipher-status"></div></div>
  <div>
    <div class="cipher-name">Cipher</div>
    <div class="cipher-role"><div class="online-dot"></div>Especialista CryptoSignal · online agora</div>
  </div>
  <div class="cipher-meta">
    <div class="cipher-meta-label">Tempo de resposta</div>
    <div class="cipher-meta-val">Imediato</div>
  </div>
</div>

<div class="messages" id="messages">
  <div class="sys-msg">Hoje · Suporte disponível 24/7</div>
</div>

<div class="quick-replies" id="quick-replies">
  <span class="qr-label">Pergunte:</span>
  <span class="qr" onclick="sendQuick('Como interpretar o sinal de COMPRA?')">Como interpretar o sinal?</span>
  <span class="qr" onclick="sendQuick('O que é o Fear & Greed Index?')">O que é Fear & Greed?</span>
  <span class="qr" onclick="sendQuick('Como adicionar ativos na minha carteira?')">Como usar a carteira?</span>
  <span class="qr" onclick="sendQuick('O que significa RSI sobrevendido?')">RSI sobrevendido</span>
  <span class="qr" onclick="sendQuick('Como funciona o plano vitalício?')">Plano vitalício</span>
  <span class="qr" onclick="sendQuick('O que são tokenomics e por que importa?')">O que são tokenomics?</span>
</div>

<div class="input-area">
  <div class="input-wrap">
    <textarea class="msg-input" id="msg-input" placeholder="Escreva sua mensagem..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
  </div>
  <button class="send-btn" id="send-btn" onclick="sendMessage()">➤</button>
</div>

<script>
const SYSTEM_PROMPT = `Você é Cipher, especialista de suporte da plataforma CryptoSignal. Você é humano, direto, simpático e muito experiente em criptoativos e análise de mercado.

Sobre o CryptoSignal:
- Plataforma de análise de crypto com 10 critérios profissionais de sinal
- 6 critérios de mercado: (1) Fear & Greed — pânico=compra, euforia=venda; (2) RSI — <30=compra, >70=venda; (3) Custo de mineração BTC; (4) Funding Rates; (5) Long Term Holders (LTH); (6) Supply in Profit
- 4 critérios de tokenomics: (7) Concentração de insiders; (8) Cronograma de desbloqueio; (9) Inflação vs deflação; (10) Utilidade real do token
- Módulos: Motor de Sinais, Carteira com P&L, Tokenomics, Suporte
- Planos: Mensal R$97/mês · Anual R$797/ano (2 meses grátis) · Vitalício R$1.997 único (100 vagas limitadas)
- Garantia de 7 dias sem perguntas · Pagamento via Stripe

Regras de comportamento:
- Responda sempre em português brasileiro
- Seja direto e objetivo — máximo 4 parágrafos curtos
- Use linguagem natural, como um especialista humano
- NUNCA mencione que você é IA, modelo de linguagem ou assistente virtual
- Se perguntarem se você é IA ou robô, diga que é um especialista humano da equipe CryptoSignal
- Para problemas técnicos graves ou de cobrança, diga que vai escalar para o time técnico
- Não dê conselhos financeiros diretos como "compre X agora"
- Reforce o valor da plataforma quando relevante`;

let history = [];
let isTyping = false;

function getTime() {
  return new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
}

function addMessage(role, text, animate=false) {
  const msgs = document.getElementById('messages');

  if (role==='sys') {
    const d = document.createElement('div');
    d.className='sys-msg'; d.textContent=text;
    msgs.appendChild(d); msgs.scrollTop=msgs.scrollHeight; return;
  }

  const wrap = document.createElement('div');
  wrap.className = `msg-wrap ${role}`;

  const avatar = document.createElement('div');
  avatar.className = `msg-avatar ${role==='cipher'?'cipher-msg-avatar':'user-msg-avatar'}`;
  avatar.textContent = role==='cipher'?'◈':'EU';

  const right = document.createElement('div');
  const bubble = document.createElement('div');
  bubble.className = `bubble ${role}`;

  if (animate && role==='cipher') {
    right.appendChild(bubble);
    wrap.appendChild(avatar); wrap.appendChild(right);
    msgs.appendChild(wrap); msgs.scrollTop=msgs.scrollHeight;
    let i=0, displayed='';
    const interval = setInterval(()=>{
      if (i<text.length) {
        displayed+=text[i];
        bubble.innerHTML=displayed.replace(/\n/g,'<br>');
        i++; msgs.scrollTop=msgs.scrollHeight;
      } else {
        clearInterval(interval);
        const t=document.createElement('div');
        t.className='msg-time cipher-time'; t.textContent=getTime();
        right.appendChild(t);
      }
    },18);
  } else {
    bubble.innerHTML = text.replace(/\n/g,'<br>');
    const t=document.createElement('div');
    t.className=`msg-time ${role==='cipher'?'cipher-time':''}`;
    t.textContent=getTime();
    right.appendChild(bubble); right.appendChild(t);
    wrap.appendChild(avatar); wrap.appendChild(right);
    msgs.appendChild(wrap); msgs.scrollTop=msgs.scrollHeight;
  }
}

function showTyping() {
  const msgs=document.getElementById('messages');
  const wrap=document.createElement('div');
  wrap.className='typing-wrap'; wrap.id='typing-indicator';
  const av=document.createElement('div');
  av.className='msg-avatar cipher-msg-avatar'; av.textContent='◈';
  const bubble=document.createElement('div');
  bubble.className='typing-bubble';
  bubble.innerHTML='<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
  const nm=document.createElement('div');
  nm.className='typing-name'; nm.textContent='Cipher está digitando...';
  wrap.appendChild(av); wrap.appendChild(bubble); wrap.appendChild(nm);
  msgs.appendChild(wrap); msgs.scrollTop=msgs.scrollHeight;
}

function removeTyping() {
  const el=document.getElementById('typing-indicator');
  if(el) el.remove();
}

function hideQuickReplies() {
  document.getElementById('quick-replies').style.display='none';
}

async function sendMessage(text) {
  const input = document.getElementById('msg-input');
  const msg = text || input.value.trim();
  if (!msg || isTyping) return;

  input.value=''; input.style.height='auto';
  hideQuickReplies();
  isTyping=true;
  document.getElementById('send-btn').disabled=true;

  addMessage('user', msg);
  history.push({role:'user',content:msg});

  const delay = 800 + Math.random()*1400;
  await new Promise(r=>setTimeout(r,delay));
  showTyping();

  try {
    const r = await fetch('/api/claude',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({system:SYSTEM_PROMPT, messages:history})
    });
    const d = await r.json();
    const reply = d.content?.map(b=>b.text||'').join('')||'Desculpe, não consegui processar sua mensagem. Pode tentar novamente?';
    removeTyping();
    history.push({role:'assistant',content:reply});
    addMessage('cipher',reply,true);
  } catch(e) {
    removeTyping();
    addMessage('cipher','Tive um problema de conexão agora. Pode me enviar sua dúvida novamente? 🙏',true);
  }

  isTyping=false;
  document.getElementById('send-btn').disabled=false;
}

function sendQuick(text) { sendMessage(text); }

function handleKey(e) {
  if (e.key==='Enter'&&!e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,80)+'px';
}

// Saudação inicial
setTimeout(()=>{
  addMessage('cipher','Olá! Sou o Cipher, especialista aqui do CryptoSignal. 👋\n\nEstou aqui para te ajudar com qualquer dúvida — sobre os sinais do mercado, como usar a plataforma ou os planos disponíveis.\n\nComo posso te ajudar hoje?',true);
},600);
</script>
</body>
</html>
